<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Best Buy Admin Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; }

    header {
      background: #0046be;
      color: white;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    header h1 { font-size: 1.4em; }
    header span { background: #ffed00; color: #0046be; padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      border-top: 4px solid #0046be;
    }
    .stat-card .number { font-size: 2em; font-weight: bold; color: #0046be; }
    .stat-card .label { color: #666; font-size: 0.9em; margin-top: 5px; }

    .section {
      background: white;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .section h2 { color: #0046be; margin-bottom: 20px; font-size: 1.2em; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

    table { width: 100%; border-collapse: collapse; }
    th { background: #0046be; color: white; padding: 10px 12px; text-align: left; font-size: 0.9em; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9em; }
    tr:hover td { background: #f8f8f8; }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: bold;
    }
    .badge.pending    { background: #fff3cd; color: #856404; }
    .badge.processing { background: #cce5ff; color: #004085; }
    .badge.completed  { background: #d4edda; color: #155724; }
    .badge.cancelled  { background: #f8d7da; color: #721c24; }

    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: bold;
    }
    .btn-complete  { background: #28a745; color: white; }
    .btn-cancel    { background: #dc3545; color: white; margin-left: 5px; }
    .btn-refresh   { background: #0046be; color: white; padding: 8px 20px; font-size: 0.9em; }
    .btn:hover { opacity: 0.85; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    input, select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9em;
    }
    input { flex: 1; min-width: 150px; }
    .btn-add { background: #0046be; color: white; padding: 8px 20px; }

    #message { padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
    #message.success { background: #d4edda; color: #155724; display: block; }
    #message.error   { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>

<header>
  <h1>🛠️ Best Buy Admin Portal</h1>
  <span>EMPLOYEE ACCESS</span>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="number" id="totalOrders">0</div>
      <div class="label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="number" id="pendingOrders">0</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="number" id="completedOrders">0</div>
      <div class="label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="number" id="totalProducts">0</div>
      <div class="label">Products</div>
    </div>
  </div>

  <!-- Orders Section -->
  <div class="section">
    <h2>📦 Order Management
      <button class="btn btn-refresh" style="float:right" onclick="loadOrders()">↻ Refresh</button>
    </h2>
    <div id="message"></div>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ordersTable">
        <tr><td colspan="7" style="text-align:center;color:#999">Loading orders...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Products Section -->
  <div class="section">
    <h2>🏷️ Product Management</h2>
    <div class="form-row">
      <input id="productName"  placeholder="Product name" />
      <input id="productPrice" placeholder="Price ($)" type="number" step="0.01" />
      <input id="productDesc"  placeholder="Description" />
      <input id="productStock" placeholder="Stock" type="number" />
      <button class="btn btn-add" onclick="addProduct()">+ Add Product</button>
    </div>
    <table>
      <thead>
        <tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
      </thead>
      <tbody id="productsTable">
        <tr><td colspan="5" style="text-align:center;color:#999">Loading products...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const ORDER_API   = window.ORDER_SERVICE_URL   || 'http://40.82.185.126:31432';
  const PRODUCT_API = window.PRODUCT_SERVICE_URL || 'http://40.82.185.126:30113';

  function showMessage(text, type) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = type;
    setTimeout(() => el.style.display = 'none', 3000);
  }

  // ── Orders ──────────────────────────────────────────────
  async function loadOrders() {
    try {
      const res = await fetch(`${ORDER_API}/orders`);
      const orders = await res.json();

      document.getElementById('totalOrders').textContent = orders.length;
      document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
      document.getElementById('completedOrders').textContent = orders.filter(o => o.status === 'completed').length;

      const tbody = document.getElementById('ordersTable');
      if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999">No orders yet</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(o => `
        <tr>
          <td style="font-family:monospace;font-size:0.8em">${o._id.slice(-8)}</td>
          <td>${o.customerName}</td>
          <td>${o.items.map(i => i.productName).join(', ')}</td>
          <td><strong>$${o.total.toFixed(2)}</strong></td>
          <td><span class="badge ${o.status}">${o.status}</span></td>
          <td>${new Date(o.createdAt).toLocaleDateString()}</td>
          <td>
            ${o.status === 'pending' ? `
              <button class="btn btn-complete" onclick="updateStatus('${o._id}','completed')">✓ Complete</button>
              <button class="btn btn-cancel"  onclick="updateStatus('${o._id}','cancelled')">✗ Cancel</button>
            ` : '—'}
          </td>
        </tr>
      `).join('');
    } catch (err) {
      document.getElementById('ordersTable').innerHTML =
        '<tr><td colspan="7" style="text-align:center;color:red">Could not connect to Order Service</td></tr>';
    }
  }

  async function updateStatus(id, status) {
    await fetch(`${ORDER_API}/orders/${id}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    showMessage(`Order marked as ${status}`, 'success');
    loadOrders();
  }

  // ── Products ─────────────────────────────────────────────
  async function loadProducts() {
    try {
      const res = await fetch(`${PRODUCT_API}/products`);
      const products = await res.json();

      document.getElementById('totalProducts').textContent = products.length;

      const tbody = document.getElementById('productsTable');
      tbody.innerHTML = products.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td>${p.category}</td>
          <td>$${p.price.toFixed(2)}</td>
          <td>${p.stock}</td>
          <td>
            <button class="btn btn-cancel" onclick="deleteProduct('${p._id}')">🗑 Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      document.getElementById('productsTable').innerHTML =
        '<tr><td colspan="5" style="text-align:center;color:red">Could not connect to Product Service</td></tr>';
    }
  }

  async function addProduct() {
    const name  = document.getElementById('productName').value;
    const price = parseFloat(document.getElementById('productPrice').value);
    const description = document.getElementById('productDesc').value;
    const stock = parseInt(document.getElementById('productStock').value) || 0;

    if (!name || !price) { showMessage('Name and price are required', 'error'); return; }

    await fetch(`${PRODUCT_API}/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price, description, stock })
    });

    document.getElementById('productName').value  = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productDesc').value  = '';
    document.getElementById('productStock').value = '';
    showMessage(`Product "${name}" added successfully`, 'success');
    loadProducts();
  }

  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    await fetch(`${PRODUCT_API}/products/${id}`, { method: 'DELETE' });
    showMessage('Product deleted', 'success');
    loadProducts();
  }

  // Load everything on start
  loadOrders();
  loadProducts();

  // Auto-refresh orders every 15 seconds
  setInterval(loadOrders, 15000);
</script>
</body>
</html>
